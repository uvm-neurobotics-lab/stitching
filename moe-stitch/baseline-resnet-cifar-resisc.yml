#
# A baseline for ComBo-like structures.
#
# We run two complete versions of ResNet-50 (minus the classification head). But we just do a simple adapter on top to
# get the final classification.
#

model:
  Assembly:
    input_shape: [3, 224, 224]
    parts:
    - ParallelPart:
        agg: concat
        in_format: img
        out_format: [img, [2048, 7, 7]]  # 2048 = (1024 + 1024)
        parts:
        - Assembly:  # ResNet 1: CIFAR100
            parts:
            - Subnet:
                frozen: true
                backend: timm
                model_name: resnet50
                ckp_path: ../experiments/from-scratch/resnet50/cifar100/checkpoint.pth
                block_input: x
                block_output: layer4
                in_format: img
                out_format: [img, [2048, 7, 7]]
            - SimpleAdapter:
                frozen: false
                in_channels: 2048
                out_channels: 1024
                num_conv: 1
                kernel_size: 1
                padding: 0
        - Assembly:  # ResNet 2: RESISC45
            parts:
            - Subnet:
                frozen: true
                backend: timm
                model_name: resnet50
                ckp_path: ../experiments/from-scratch/resnet50/resisc45/checkpoint.pth
                block_input: x
                block_output: layer4
                in_format: img
                out_format: [img, [2048, 7, 7]]
            - SimpleAdapter:
                frozen: false
                in_channels: 2048
                out_channels: 1024
                num_conv: 1
                kernel_size: 1
                padding: 0
    head:
      ClassifierHead: {}

deterministic: false
eval_checkpoints: true
save_checkpoints: false

datasets: !include default-datasets.yml

train_config:
  # Dataset
  data_preprocessing:
    image_size: 224
    data_augmentation: default

  # General Params
  seed: 12345
  epochs: &epochs 10

  # Optimization
  batch_size: 128  # assuming 2 GPU, so effective batch size = 256
  # TODO: consider adding label smoothing
  loss_fn: cross_entropy

  # TODO: Consider adding linear warmup.
  lr_scheduler: CosineAnnealingLR
  lr_scheduler_args:
    T_max: *epochs
    eta_min: 0.0
  # TODO: Consider adding gradient clipping:
  # max_grad_norm: 1.0
  optimizer: AdamW
  optimizer_args:
    lr: 0.002
    weight_decay: 0.05
