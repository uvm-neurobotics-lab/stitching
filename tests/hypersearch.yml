#
# Configuration for a Weights & Biases hyperparameter search for fine-tuning.
#
# To launch this sweep:
#   1. Create the sweep:
#      wandb sweep tests/hypersearch.yml
#   2. Run an agent (passing extra args to the script via the command line):
#      CONFIG=moe-stitch/baseline-resnet-cifar-resisc.yml HARDWARE=v100 wandb agent <sweep-id> --count 10

program: src/hypertrain.py
command:
  - ${interpreter}
  - ${program}
  - "--config=${envvar:CONFIG}"
  - "--hardware=${envvar:HARDWARE}"
  - "--conda=${envvar:CONDA_DEFAULT_ENV}"
method: bayes
metric:
  goal: maximize
  name: Avg Test Accuracy
parameters:
  batch_size:
    values: [64, 128, 256]
  lr:
    values: [0.05, 0.01, 0.005, 0.001, 0.0005, 0.0001]
  weight_decay:
    values: [0.1, 0.05, 0.005]
  epochs:
    value: 10
